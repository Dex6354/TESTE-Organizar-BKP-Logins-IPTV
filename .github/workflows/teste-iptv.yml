name: Test Geonode Targeting

on:
  workflow_dispatch: # Permite que você execute manualmente pelo painel do GitHub

jobs:
  simulate-request:
    runs-on: ubuntu-latest

    steps:
      - name: Validar Configuração de Proxy
        run: |
          echo "=== INICIANDO SIMULAÇÃO DE REQUISIÇÃO ==="
          echo "Forçando Configuração: Geo Targeting=Brazil"
          echo "Tipo de Proxy: residential"
          echo "========================================"

      - name: Simular Payload de Envio
        run: |
          # Exibe como o payload mockado se comporta com a região travada no Brasil
          cat <<EOF
          {
            "url": "http://websmt.ca/player_api.php?username=concmus03&password=3a3b3c3d",
            "formats": ["html", "markdown"],
            "render_js": false,
            "processing_mode": "sync",
            "proxy": {
              "country": "BR",
              "type": "residential"
            },
            "headers": {
              "Accept-Language": "pt-BR"
            }
          }
          EOF

      - name: Status do Teste
        run: |
          echo "Sucesso: Simulação executada com Geo Targeting=Brazil ativo."
