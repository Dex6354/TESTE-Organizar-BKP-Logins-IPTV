name: Geonode Real Request Test

on:
  workflow_dispatch: # Execução manual pelo painel do GitHub

jobs:
  execute-request:
    runs-on: ubuntu-latest

    steps:
      - name: Executar Requisição Geonode
        run: |
          echo "Iniciando requisição real com Geo-Targeting Brasil (Residencial) e User-Agent simulado..."
          
          RESPONSE=$(curl -s -X POST "https://scraper.geonode.io/v1/extract" \
            -H "x-api-key: 4c6317bd-c28f-4816-8a92-a3d8f362a6fa" \
            -H "Content-Type: application/json" \
            -d '{
              "url": "http://websmt.ca/player_api.php?username=concmus03&password=3a3b3c3d",
              "formats": ["html", "markdown"],
              "render_js": false,
              "processing_mode": "sync",
              "proxy": {
                "country": "BR",
                "type": "residential"
              },
              "headers": {
                "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36",
                "Accept-Language": "pt-BR,pt;q=0.9,en-US;q=0.8,en;q=0.7",
                "Accept": "text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8"
              }
            }')

          echo "================ CONTEÚDO DO JSON ================"
          echo "$RESPONSE" | jq .
          echo "=================================================="
